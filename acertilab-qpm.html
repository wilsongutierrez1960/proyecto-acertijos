<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcertiLab · Módulo B — Modelo QPM</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #21262d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --muted:    #8b949e;
      --text:     #e6edf3;
      --correct:  #1a4a2e;
      --wrong:    #4a1a1a;
      --correct-border: #3fb950;
      --wrong-border:   #f78166;
      --font-display: 'Georgia', serif;
      --font-body:    'Segoe UI', Arial, sans-serif;
      --font-mono:    'Consolas', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; }

    /* HEADER */
    .top-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
    .back-link {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--muted); text-decoration: none; letter-spacing: 0.1em;
    }
    .back-link:hover { color: var(--accent); }
    .module-badge {
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent);
      padding: 0.2rem 0.6rem; border-radius: 2px;
    }
    .module-links { display: flex; gap: 0.5rem; margin-left: auto; flex-wrap: wrap; }
    .module-links a {
      font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em;
      text-decoration: none; color: var(--muted); border: 1px solid var(--border);
      padding: 0.2rem 0.55rem; border-radius: 2px;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .module-links a:hover { border-color: var(--accent); color: var(--accent); }
    .module-links a.current { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 560px) {
      .module-links a:not(.current) { display: none; }
      .top-nav { flex-wrap: wrap; }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: normal; margin-bottom: 0.5rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.75rem; }

    /* SECCIÓN TABS */
    .section-tabs {
      display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .tab-btn {
      font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      border-radius: 3px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .tab-btn:hover, .tab-btn.active {
      border-color: var(--accent); color: var(--accent);
    }

    /* PROGRESO */
    .progress-wrap { margin-bottom: 2rem; }
    .progress-info {
      display: flex; justify-content: space-between;
      font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--muted); margin-bottom: 0.4rem;
    }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.4s ease; width: 0%;
    }

    /* SECCIÓN HEADER */
    .section-header {
      font-family: var(--font-mono); font-size: 0.68rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent2); border-left: 2px solid var(--accent2);
      padding-left: 0.75rem; margin: 2rem 0 1.25rem;
    }

    /* PREGUNTAS */
    .question-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 1.75rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.3s, background 0.3s;
    }
    .question-block.answered-correct { border-color: var(--correct-border); background: var(--correct); }
    .question-block.answered-wrong   { border-color: var(--wrong-border);   background: var(--wrong); }

    .q-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 1rem; }
    .q-num { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; flex-shrink: 0; }
    .q-text { font-size: 0.975rem; line-height: 1.65; }

    .q-formula {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.6rem 1rem;
      font-family: var(--font-mono); font-size: 0.85rem;
      color: var(--accent2); margin: 0.75rem 0; letter-spacing: 0.03em;
    }

    /* OPCIONES */
    .options { display: flex; flex-direction: column; gap: 0.55rem; margin-top: 1rem; }
    .opt {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.65rem 1rem;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); cursor: pointer;
      font-size: 0.875rem; line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
      text-align: left; color: var(--text); width: 100%;
    }
    .opt:hover:not(:disabled) { border-color: var(--accent); }
    .opt:disabled { cursor: default; }
    .opt.correct { border-color: var(--correct-border); background: #1a3a22; color: #7ee89a; }
    .opt.wrong   { border-color: var(--wrong-border);   background: #3a1a1a; color: #f78166; }
    .opt.reveal  { border-color: var(--correct-border); background: #1a3a22; color: #7ee89a; }
    .opt-key { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); width: 1.2rem; flex-shrink: 0; padding-top: 0.1rem; }

    /* FEEDBACK */
    .feedback {
      margin-top: 1rem; font-size: 0.85rem;
      color: var(--muted); line-height: 1.6; display: none;
      border-top: 1px solid var(--border); padding-top: 0.9rem;
    }
    .feedback.show { display: block; }
    .feedback strong { color: var(--text); }
    .feedback code {
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--accent2); background: var(--bg);
      padding: 0.1rem 0.35rem; border-radius: 3px;
    }

    /* SCORE */
    .score-panel {
      display: none; background: var(--surface);
      border: 1px solid var(--accent2); border-radius: 6px;
      padding: 2rem; text-align: center; margin-top: 2rem;
    }
    .score-panel.show { display: block; }
    .score-num { font-family: var(--font-display); font-size: 3.5rem; color: var(--accent2); line-height: 1; }
    .score-label { color: var(--muted); margin-top: 0.5rem; font-size: 0.9rem; }
    .score-breakdown {
      margin-top: 1rem; font-family: var(--font-mono);
      font-size: 0.75rem; color: var(--muted);
    }
    .btn-retry {
      margin-top: 1.5rem; padding: 0.6rem 1.5rem;
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); border-radius: 4px;
      font-family: var(--font-mono); font-size: 0.8rem;
      letter-spacing: 0.1em; cursor: pointer;
    }
    .btn-retry:hover { background: var(--accent); color: var(--bg); }

    /* ── AcertiLab: banner de progreso + revisión ─────────── */
    .al-banner {
      display: none;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--text);
    }
    .al-banner .al-badge { font-weight: 700; color: var(--accent); }
    .al-banner .al-muted { color: var(--muted); }
    .al-banner .al-link-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .al-banner .al-link-btn:hover { border-color: var(--accent); color: var(--accent); }
    .al-review-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .al-review-panel.show { display: block; }
    .al-review-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .al-review-item:last-child { border-bottom: none; }
    .al-review-item.wrong { color: #f78166; }
    .al-review-item.correct { color: #7ee89a; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a class="back-link" href="index.html">← inicio</a>

  <h1>Modelo QPM</h1>
  <p class="subtitle">28 preguntas · Núcleo técnico + IMF Post-Course</p>

  <div class="al-banner" id="alBanner"></div>
  <div class="al-review-panel" id="alReview"></div>
  <div style="text-align:right;margin-bottom:1rem;">
    <button class="al-link-btn" style="margin-left:0;" onclick="AcertiLabExport.exportModule('B', {sectionLabels:{nucleo:'Núcleo QPM', post:'Post-Course IMF'}})">📄 Exportar resultado (PDF)</button>

  <div class="section-tabs">
    <button class="tab-btn active" onclick="filterSection('all', this)">Todas</button>

  <div class="progress-wrap">

  <div id="quiz"></div>

  <div class="score-panel" id="scorePanel">

<script src="acertilab-storage.js"></script>

<script>
const questions = [
  // ── NÚCLEO QPM ──────────────────────────────────────────────────────────
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "En el modelo QPM, ¿qué representa el canal MCI (Monetary Conditions Index)?",
    opts: [
      "La tasa de política monetaria únicamente",
      "La combinación ponderada de la tasa de interés real y el tipo de cambio real",
      "El nivel de reservas internacionales del banco central",
      "El spread entre tasas activas y pasivas del sistema bancario"
    ],
    ans: 1,
    exp: "El <strong>MCI</strong> agrega en un solo indicador las condiciones monetarias vía tasa de interés real y tipo de cambio real, ponderadas por su impacto relativo sobre la demanda agregada."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "La ecuación de la curva de Phillips en el QPM relaciona principalmente:",
    formula: "π_t = α·π_{t+1} + (1−α)·π_{t−1} + β·ygap_t + ε_t",
    opts: [
      "Inflación con el desempleo estructural y las expectativas de largo plazo",
      "Inflación con inflación esperada, inflación pasada, brecha del producto y shock de oferta",
      "Inflación importada con el tipo de cambio nominal y aranceles",
      "Inflación subyacente con agregados monetarios M1 y M2"
    ],
    ans: 1,
    exp: "La Phillips en QPM mezcla <strong>expectativas forward-looking</strong> (α) y componente <strong>backward-looking</strong> (1−α), más el efecto de la <strong>brecha del producto</strong> (ygap) y un shock de oferta (ε)."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "La regla de Taylor en el QPM determina la tasa de política monetaria. ¿Cuáles son sus argumentos estándar?",
    formula: "i_t = i* + φ_π·(π_t − π*) + φ_y·ygap_t",
    opts: [
      "Tasa neutral, brecha de inflación y brecha del producto",
      "Tasa de referencia externa, tipo de cambio esperado y reservas",
      "Tasa overnight, spread crediticio y déficit fiscal",
      "Meta de inflación, crecimiento del crédito y cuenta corriente"
    ],
    ans: 0,
    exp: "La regla de Taylor canónica reacciona a la <strong>tasa neutral real</strong> (i*), la <strong>brecha de inflación</strong> (π − π*) y la <strong>brecha del producto</strong> (ygap). Los coeficientes φ reflejan la agresividad de la política."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "¿Qué establece la condición de Paridad de Tasas de Interés (UIP) en su versión modificada para el QPM?",
    formula: "i_t = i*_t + Δs^e_{t+1} + ρ_t",
    opts: [
      "La tasa local iguala la tasa externa ajustada por depreciación esperada y prima de riesgo",
      "La tasa real doméstica converge a la tasa neutral de largo plazo en el estado estacionario",
      "El tipo de cambio nominal sigue un paseo aleatorio sin intervención del banco central",
      "La inflación doméstica converge a la inflación externa por arbitraje de bienes transables"
    ],
    ans: 0,
    exp: "La <strong>UIP modificada</strong> agrega una <strong>prima de riesgo país</strong> (ρ) a la condición estándar. Así: tasa local = tasa externa + depreciación esperada + prima, permitiendo diferenciales sostenidos."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "La ecuación de Fisher en el QPM vincula tasas nominales y reales. ¿Cuál es la forma correcta?",
    formula: "r_t ≈ i_t − π^e_{t+1}",
    opts: [
      "La tasa real ex-ante es la tasa nominal menos la inflación futura esperada",
      "La tasa real ex-post es la tasa nominal menos la inflación pasada realizada",
      "La tasa nominal es independiente de las expectativas de inflación en el corto plazo",
      "La tasa real de largo plazo siempre iguala el crecimiento del PIB potencial"
    ],
    ans: 0,
    exp: "En QPM se usa la tasa real <strong>ex-ante</strong>: r_t = i_t − π^e_{t+1}. Es la relevante para las decisiones de gasto porque los agentes descuentan la <strong>inflación esperada</strong>, no la realizada."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "¿Qué rol cumple el filtro de Kalman dentro del QPM?",
    opts: [
      "Estima la probabilidad de cambio de régimen de política monetaria",
      "Extrae variables no observables como la brecha del producto y la tasa neutral en tiempo real",
      "Proyecta el tipo de cambio nominal mediante regresión de cointegración",
      "Calibra los parámetros de la curva de Phillips usando datos de panel"
    ],
    ans: 1,
    exp: "El <strong>filtro de Kalman</strong> es un algoritmo de dos pasos (predicción + actualización) que extrae variables latentes como el <strong>PIB potencial</strong> y la <strong>tasa neutral</strong>, combinando el modelo estructural con la información de los datos observados."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "En el QPM, la brecha del producto (output gap) se define como:",
    opts: [
      "La diferencia entre PIB nominal y PIB real a precios constantes",
      "La diferencia porcentual entre el PIB observado y el PIB potencial",
      "El crecimiento del PIB trimestral desestacionalizado anualizado",
      "La variación del PIB respecto al promedio de los últimos 8 trimestres"
    ],
    ans: 1,
    exp: "El <strong>output gap</strong> = (Y − Y*) / Y* × 100. Mide la holgura cíclica de la economía. Un gap positivo indica presiones inflacionarias; uno negativo, capacidad ociosa."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "¿Cuál es el estado estacionario (steady state) de la tasa de interés real en el QPM?",
    opts: [
      "Siempre igual a cero en modelos de inflación objetivo pura",
      "La tasa neutral real de largo plazo, consistente con inflación en meta y brecha nula",
      "La tasa de los Fed Funds ajustada por paridad de poder adquisitivo",
      "El promedio histórico de la tasa real observada en los últimos 10 años"
    ],
    ans: 1,
    exp: "En el estado estacionario del QPM: inflación = meta, ygap = 0, y la tasa real = <strong>tasa neutral real de largo plazo</strong> (r*). Es el ancla del modelo hacia la que convergen las variables en ausencia de shocks."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "Las Funciones de Impulso-Respuesta (IRFs) en el QPM muestran:",
    opts: [
      "La distribución estacionaria de las variables ante cambios en parámetros estructurales",
      "La trayectoria de ajuste de las variables ante un shock de una desviación estándar",
      "La correlación contemporánea entre inflación y brecha del producto a lo largo del ciclo",
      "La descomposición histórica de la varianza del PIB por tipo de shock"
    ],
    ans: 1,
    exp: "Las <strong>IRFs</strong> ilustran cómo responde cada variable (inflación, tasa, gap) a un shock unitario a lo largo del tiempo. Son clave para verificar que las respuestas del modelo son <strong>económicamente plausibles</strong> antes de usarlo para proyecciones."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "¿Qué herramienta computacional usa el FMI principalmente para calibrar y correr el QPM?",
    opts: [
      "EViews con módulo VAR estructural",
      "IRIS Toolbox sobre plataforma MATLAB",
      "R con el paquete DSGE del Banco Mundial",
      "Python con librería Dynare-Python"
    ],
    ans: 1,
    exp: "<strong>IRIS Toolbox</strong> es un conjunto de herramientas de código abierto que corre sobre <strong>MATLAB</strong>, desarrollado específicamente para modelos macroeconómicos de bancos centrales. El FMI lo usa para QPM, incluyendo simulación, calibración y filtrado."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "En la ecuación de demanda agregada del QPM, ¿cuál de los siguientes es un determinante del output gap?",
    formula: "ygap_t = β·ygap_{t−1} − γ·MCI_t + δ·ygap*_t + ε_t",
    opts: [
      "El nivel de la tasa nominal de corto plazo solamente",
      "Las condiciones monetarias (MCI), el output gap externo y la inercia del ciclo",
      "El déficit fiscal corriente y el stock de deuda pública",
      "El crecimiento de M2 y la velocidad de circulación del dinero"
    ],
    ans: 1,
    exp: "El output gap depende de: su propia <strong>inercia</strong> (β·ygap_{t−1}), las <strong>condiciones monetarias</strong> (−γ·MCI), el ciclo externo (δ·ygap*) y un shock de demanda (ε). El MCI incluye tanto la tasa real como el tipo de cambio real."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "¿Qué significa 'calibración' en el contexto del QPM a diferencia de 'estimación'?",
    opts: [
      "Calibrar es ajustar parámetros mediante máxima verosimilitud; estimar es hacerlo por juicio experto",
      "Calibrar es fijar parámetros por juicio experto e información a priori; estimar es inferirlos estadísticamente de los datos",
      "Calibrar y estimar son sinónimos en modelos de series de tiempo estructurales",
      "Calibrar implica usar datos de panel; estimar implica usar series de tiempo univariadas"
    ],
    ans: 1,
    exp: "En QPM, muchos parámetros se <strong>calibran</strong>: se fijan usando teoría económica, comparaciones internacionales o juicio del equipo técnico, porque los datos disponibles no permiten identificarlos con precisión estadística."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "La inflación importada en el QPM se transmite principalmente a través de:",
    opts: [
      "Los agregados monetarios M1 y M2 y el multiplicador bancario",
      "El tipo de cambio nominal y los precios internacionales de commodities",
      "La brecha del producto externo y las tasas de interés de la Fed",
      "El pass-through del tipo de cambio sobre costos laborales unitarios"
    ],
    ans: 1,
    exp: "La <strong>inflación importada</strong> entra al QPM vía <strong>tipo de cambio nominal</strong> (depreciacíon → encarece importaciones) y <strong>precios externos</strong> (commodities, inflación socios comerciales). El pass-through puede ser total o parcial según calibración."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "¿Cuál de las siguientes describe correctamente la estructura de bloques del QPM estándar?",
    opts: [
      "Bloque fiscal → bloque monetario → bloque externo → bloque de expectativas",
      "Demanda agregada (IS) → Oferta agregada (Phillips) → Paridad de tasas (UIP) → Regla de política (Taylor)",
      "Sector real → Sector financiero → Sector externo → Sector público",
      "VAR reducido → identificación estructural → proyección fuera de muestra"
    ],
    ans: 1,
    exp: "El QPM tiene cuatro bloques encadenados: <strong>IS</strong> (demanda/output gap) → <strong>Phillips</strong> (inflación) → <strong>UIP</strong> (tipo de cambio) → <strong>Taylor</strong> (política monetaria). Las expectativas son forward-looking en todos los bloques."
  },
  {
    section: "nucleo",
    sectionLabel: "Núcleo QPM",
    q: "En el QPM, ¿qué se entiende por 'cierre del modelo' (model closure)?",
    opts: [

let answered = 0;
let correctCount = 0;
let correctNucleo = 0;
let correctPost = 0;
let lastDetails = [];
let total = questions.length;
let currentFilter = 'all';

function build(filter) {
  const container = document.getElementById('quiz');
  container.innerHTML = '';

  let lastSection = '';
  let idx = 0;

  questions.forEach((q, i) => {
    if (filter !== 'all' && q.section !== filter) return;

    if (q.sectionLabel !== lastSection) {
      const sh = document.createElement('div');
      sh.className = 'section-header';
      sh.textContent = q.sectionLabel;
      container.appendChild(sh);
      lastSection = q.sectionLabel;
    }

    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q${i}`;

    const num = String(i + 1).padStart(2, '0');
    const formulaHtml = q.formula
      ? `<div class="q-formula">${q.formula}</div>` : '';

    const optsHtml = q.opts.map((o, j) => `
      <button class="opt" onclick="answer(${i},${j})" id="opt${i}_${j}">
        <span class="opt-key">${String.fromCharCode(65+j)}</span>
        <span>${o}</span>
      </button>
    `).join('');

    block.innerHTML = `
      <div class="q-header">
        <span class="q-num">${num}</span>
        <span class="q-text">${q.q}</span>
      </div>
      ${formulaHtml}
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="fb${i}">${q.exp}</div>
    `;
    container.appendChild(block);
    idx++;
  });
}

function answer(qi, oi) {
  const q = questions[qi];
  const block = document.getElementById(`q${qi}`);
  const fb = document.getElementById(`fb${qi}`);

  if (!block || block.dataset.answered) return;
  block.dataset.answered = '1';

  q.opts.forEach((_, j) => {
    const btn = document.getElementById(`opt${qi}_${j}`);
    if (!btn) return;
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('reveal');
  });

  const chosen = document.getElementById(`opt${qi}_${oi}`);
  if (oi === q.ans) {
    chosen.classList.add('correct');
    block.classList.add('answered-correct');
    correctCount++;
    if (q.section === 'nucleo') correctNucleo++;
    else correctPost++;
  } else {
    chosen.classList.add('wrong');
    block.classList.add('answered-wrong');
  }
  lastDetails.push({ qIndex: qi, chosen: oi, isCorrect: oi === q.ans });

  fb.classList.add('show');
  answered++;
  updateProgress();

  if (answered === total) setTimeout(showScore, 700);
}

function updateProgress() {
  const pct = Math.round(answered / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${total} respondidas`;
  document.getElementById('progressPct').textContent = pct + '%';
}

function showScore() {
  const panel = document.getElementById('scorePanel');
  document.getElementById('scoreNum').textContent = `${correctCount}/${total}`;

  if (currentFilter === 'all') {
    document.getElementById('scoreBreak').innerHTML =
      `Núcleo QPM: ${correctNucleo}/15 &nbsp;·&nbsp; Post-Course IMF: ${correctPost}/13`;
  } else {
    const label = currentFilter === 'nucleo' ? 'Núcleo QPM' : 'Post-Course IMF';
    document.getElementById('scoreBreak').innerHTML =
      `Resultado parcial — sección: <strong>${label}</strong> (${total} preguntas)`;
  }
  panel.classList.add('show');
  panel.scrollIntoView?.({ behavior: 'smooth' });

  AcertiLab.saveModuleResult('B', {
    correct: correctCount,
    total: total,
    details: lastDetails,
    breakdown: { nucleo: correctNucleo, post: correctPost },
    partial: currentFilter !== 'all',
    section: currentFilter
  });
  AcertiLabUI.renderBanner({
    moduleId: 'B',
    bannerEl: document.getElementById('alBanner'),
    reviewEl: document.getElementById('alReview'),
    getQuestion: (i) => questions[i]
  });
}

function filterSection(section, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  build(section);
  currentFilter = section;
  total = section === 'all' ? questions.length : questions.filter(q => q.section === section).length;
  answered = 0; correctCount = 0; correctNucleo = 0; correctPost = 0; lastDetails = [];
  updateProgress();
}

build('all');
AcertiLabUI.renderBanner({
  moduleId: 'B',
  bannerEl: document.getElementById('alBanner'),
  reviewEl: document.getElementById('alReview'),
});
</script>
