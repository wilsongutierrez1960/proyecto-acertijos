<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcertiLab · Módulo C — QPM Aplicado</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #21262d;
      --accent:   #d2a679;
      --accent2:  #3fb950;
      --muted:    #8b949e;
      --text:     #e6edf3;
      --correct:  #1a4a2e;
      --wrong:    #4a1a1a;
      --correct-border: #3fb950;
      --wrong-border:   #f78166;
      --hint-bg:  #1c2333;
      --hint-border: #d2a679;
      --font-display: 'Georgia', serif;
      --font-body:    'Segoe UI', Arial, sans-serif;
      --font-mono:    'Consolas', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; }

    /* HEADER */
    .top-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
    .back-link {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--muted); text-decoration: none; letter-spacing: 0.1em;
    }
    .back-link:hover { color: var(--accent); }
    .module-badge {
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent);
      padding: 0.2rem 0.6rem; border-radius: 2px;
    }
    .module-links { display: flex; gap: 0.5rem; margin-left: auto; flex-wrap: wrap; }
    .module-links a {
      font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em;
      text-decoration: none; color: var(--muted); border: 1px solid var(--border);
      padding: 0.2rem 0.55rem; border-radius: 2px;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .module-links a:hover { border-color: var(--accent); color: var(--accent); }
    .module-links a.current { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 560px) {
      .module-links a:not(.current) { display: none; }
      .top-nav { flex-wrap: wrap; }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: normal; margin-bottom: 0.5rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .subtitle-note {
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--accent); margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    /* TABS */
    .section-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .tab-btn {
      font-family: var(--font-mono); font-size: 0.7rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      border-radius: 3px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .tab-btn:hover, .tab-btn.active { border-color: var(--accent); color: var(--accent); }

    /* PROGRESO */
    .progress-wrap { margin-bottom: 2rem; }
    .progress-info {
      display: flex; justify-content: space-between;
      font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--muted); margin-bottom: 0.4rem;
    }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.4s ease; width: 0%;
    }

    /* SECCIÓN HEADER */
    .section-header {
      font-family: var(--font-mono); font-size: 0.68rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); border-left: 2px solid var(--accent);
      padding-left: 0.75rem; margin: 2rem 0 1.25rem;
    }

    /* PREGUNTAS */
    .question-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 1.75rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.3s, background 0.3s;
    }
    .question-block.answered-correct { border-color: var(--correct-border); background: var(--correct); }
    .question-block.answered-wrong   { border-color: var(--wrong-border);   background: var(--wrong); }

    .q-header { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 0.9rem; }
    .q-num { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; flex-shrink: 0; }
    .q-text { font-size: 0.975rem; line-height: 1.65; }

    .q-formula {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.6rem 1rem;
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--accent2); margin: 0.75rem 0; letter-spacing: 0.02em;
      white-space: pre-wrap;
    }

    /* PISTA */
    .hint-box {
      background: var(--hint-bg);
      border: 1px solid var(--hint-border);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      margin: 0.75rem 0 0;
      font-size: 0.82rem;
      color: var(--accent);
      line-height: 1.6;
    }
    .hint-box::before {
      content: '💡 Pista: ';
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: bold;
    }

    /* OPCIONES */
    .options { display: flex; flex-direction: column; gap: 0.55rem; margin-top: 1rem; }
    .opt {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.65rem 1rem;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); cursor: pointer;
      font-size: 0.875rem; line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
      text-align: left; color: var(--text); width: 100%;
    }
    .opt:hover:not(:disabled) { border-color: var(--accent); }
    .opt:disabled { cursor: default; }
    .opt.correct { border-color: var(--correct-border); background: #1a3a22; color: #7ee89a; }
    .opt.wrong   { border-color: var(--wrong-border);   background: #3a1a1a; color: #f78166; }
    .opt.reveal  { border-color: var(--correct-border); background: #1a3a22; color: #7ee89a; }
    .opt-key { font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); width: 1.2rem; flex-shrink: 0; padding-top: 0.1rem; }

    /* FEEDBACK */
    .feedback {
      margin-top: 1rem; font-size: 0.85rem;
      color: var(--muted); line-height: 1.6; display: none;
      border-top: 1px solid var(--border); padding-top: 0.9rem;
    }
    .feedback.show { display: block; }
    .feedback strong { color: var(--text); }
    .feedback code {
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--accent2); background: var(--bg);
      padding: 0.1rem 0.35rem; border-radius: 3px;
    }

    /* SCORE */
    .score-panel {
      display: none; background: var(--surface);
      border: 1px solid var(--accent2); border-radius: 6px;
      padding: 2rem; text-align: center; margin-top: 2rem;
    }
    .score-panel.show { display: block; }
    .score-num { font-family: var(--font-display); font-size: 3.5rem; color: var(--accent2); line-height: 1; }
    .score-label { color: var(--muted); margin-top: 0.5rem; font-size: 0.9rem; }
    .score-breakdown { margin-top: 1rem; font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); }
    .btn-retry {
      margin-top: 1.5rem; padding: 0.6rem 1.5rem;
      background: transparent; border: 1px solid var(--accent);
      color: var(--accent); border-radius: 4px;
      font-family: var(--font-mono); font-size: 0.8rem;
      letter-spacing: 0.1em; cursor: pointer;
    }
    .btn-retry:hover { background: var(--accent); color: var(--bg); }

    /* ── AcertiLab: banner de progreso + revisión ─────────── */
    .al-banner {
      display: none;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--text);
    }
    .al-banner .al-badge { font-weight: 700; color: var(--accent); }
    .al-banner .al-muted { color: var(--muted); }
    .al-banner .al-link-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .al-banner .al-link-btn:hover { border-color: var(--accent); color: var(--accent); }
    .al-review-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .al-review-panel.show { display: block; }
    .al-review-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .al-review-item:last-child { border-bottom: none; }
    .al-review-item.wrong { color: #f78166; }
    .al-review-item.correct { color: #7ee89a; }
  </style>
</head>

  <p class="subtitle">28 preguntas · Módulos 4–6 del curso FMI</p>

  <div class="al-banner" id="alBanner"></div>

  <div style="text-align:right;margin-bottom:1rem;">

<script src="acertilab-storage.js"></script>
<script src="acertilab-export.js"></script>
<script src="acertilab-ui.js"></script>
<script>
const questions = [

  // ── MÓDULO 4: DATOS Y REPORTES ───────────────────────────────────────────
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "¿Cuál es el comando correcto en IRIS Toolbox para guardar la base de datos 'dt' en el archivo 'data_filtered.csv'?",
    hint: "En IRIS, las bases de datos tienen comandos propios distintos a los de MATLAB base. El prefijo 'db' identifica operaciones sobre bases de datos IRIS (db = database). Pensá: ¿cuál es el verbo para 'guardar' una db?",
    formula: null,
    opts: [
      "dt = save('data_filtered.csv');",
      "dbsave(dt, 'data_filtered.csv');",
      "save(dt, 'data_filtered.csv');",
      "dbexport(dt, 'data_filtered.csv');"
    ],
    ans: 1,
    exp: "<strong>dbsave(dt, 'data_filtered.csv')</strong> es el comando IRIS para guardar una base de datos en formato CSV. <code>save()</code> es MATLAB base y guarda en formato .mat. <code>dbexport</code> no existe en IRIS. El prefijo <strong>db</strong> marca todos los comandos de gestión de bases de datos en IRIS."
  },
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "¿Cuál es el comando IRIS correcto para crear una serie de tiempo 'my_ts' con valor 2 en el segundo trimestre de 2018?",
    hint: "En IRIS, el tiempo trimestral se expresa con la función qq(año, trimestre). La función tseries() crea series temporales. El resultado debe asignarse a una variable — ¿qué sintaxis de MATLAB hace eso?",
    formula: "my_ts = tseries(qq(2018,2), 2);",
    opts: [
      "tseries(my_ts, 2018Q2, 2);",
      "tseries(my_ts, qq(2018,2), 2);",
      "my_ts = tseries(2018Q2, 2);",
      "my_ts = tseries(qq(2018,2), 2);"
    ],
    ans: 3,
    exp: "<strong>my_ts = tseries(qq(2018,2), 2)</strong> es la sintaxis correcta. <code>qq(2018,2)</code> genera la fecha trimestral Q2-2018. <code>tseries(fecha, valor)</code> construye la serie. La asignación <code>my_ts =</code> es obligatoria — sin ella, MATLAB ejecuta pero no guarda el resultado. <code>2018Q2</code> sin la función qq() no es sintaxis válida en IRIS."
  },
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "En el código MATLAB/IRIS: simulate(m, d, qq(1,2):qq(4,3), 'deviation', false); ¿Qué instrucciones se están emitiendo?",
    hint: "Descomponé el comando argumento por argumento: (1) m = modelo, (2) d = base de datos con condiciones iniciales y shocks, (3) el rango de fechas qq(año,trimestre), (4) 'deviation',false = simular niveles, no desviaciones. El rango qq(1,2):qq(4,3) va del Q2 del año 1 al Q3 del año 4.",
    formula: "simulate(m, d, qq(1,2):qq(4,3), 'deviation', false);",
    opts: [
      "Simular el efecto de shocks en la base 'd' sobre variables del modelo 'm', Q2-año1 a Q3-año4. Calcular diferencias del balanced growth path.",
      "Simular las variables del modelo 'd' entre Q2-año1 y Q3-año4. Tomar shocks del modelo 'm'.",
      "Simular las variables del modelo 'm' entre Q2-año1 y Q3-año4. Tomar shocks y condiciones iniciales de la base 'd'.",
      "Simular las variables del modelo 'm' entre Q1-año2 y Q4-año3. Tomar shocks de la base 'd'."
    ],
    ans: 2,
    exp: "La sintaxis de <strong>simulate</strong> en IRIS es: simulate(<em>modelo</em>, <em>base_datos</em>, <em>rango</em>, opciones). El primer argumento es siempre el <strong>modelo (m)</strong>, el segundo la <strong>base de datos (d)</strong> con condiciones iniciales y shocks. <code>'deviation',false</code> indica que se simulan <strong>niveles</strong>, no desviaciones del estado estacionario. El rango qq(1,2):qq(4,3) = Q2-año1 a Q3-año4."
  },
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "¿Cuál de las siguientes afirmaciones es FALSA sobre la funcionalidad de MATLAB/IRIS?",
    hint: "Pensá en lo que permite IRIS para trabajar con múltiples calibraciones. Recordá que en IRIS podés tener varios parámetros en un mismo objeto modelo. La pregunta apunta a si podés graficar dos calibraciones juntas sin usar un loop explícito.",
    formula: null,
    opts: [
      "Los objetos modelo deben tener valores numéricos asignados antes de ser resueltos.",
      "Los objetos modelo pueden contener múltiples calibraciones y sus soluciones simultáneamente.",
      "Se puede simular un modelo bajo múltiples calibraciones con un solo comando.",
      "La única forma de graficar resultados de dos calibraciones en el mismo gráfico es usando un loop."
    ],
    ans: 3,
    exp: "La afirmación <strong>FALSA</strong> es la D. IRIS permite graficar múltiples calibraciones en el mismo gráfico <strong>sin necesidad de un loop explícito</strong>, usando las capacidades vectorizadas de los objetos modelo. Un modelo IRIS puede contener N parametrizaciones y simularlas/graficarlas con un solo comando, precisamente para facilitar el análisis de sensibilidad."
  },
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "¿Por qué se usan convenciones de nomenclatura (mnemonics) en los códigos de modelos QPM?",
    hint: "Los mnemonics como L_GDP_GAP, DLA_CPI, RR_BAR tienen una lógica interna: el prefijo indica la transformación (L=log, D=diferencia, DLA=diferencia log anualizada) y el sufijo indica el tipo (_BAR=tendencia, _GAP=brecha, _RW=externo). Esto permite loops y búsquedas automáticas.",
    formula: null,
    opts: [
      "Indicar información sobre el contenido de las variables en sus nombres",
      "Agilizar la codificación y permitir consistencia entre miembros del equipo",
      "Mejor agrupación de variables para operaciones de búsqueda/loop",
      "Capturar todas las posibilidades reales de nombrar variables"
    ],
    ans: 3,
    exp: "Las tres primeras opciones son <strong>ventajas reales</strong> de los mnemonics: comunicar contenido, facilitar trabajo en equipo y permitir loops automáticos (ej: buscar todas las variables que terminan en _GAP). La opción D es la <strong>FALSA</strong>: los mnemonics son convenciones acotadas — no pueden capturar todas las posibilidades de nomenclatura, sino que las restringen deliberadamente para ganar consistencia."
  },
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "¿Cuál es la diferencia principal entre el filtro Hodrick-Prescott (HP) y el filtro Band-Pass (BP)?",
    hint: "Ambos filtros descomponen una serie en tendencia y ciclo, pero operan en el dominio de frecuencias de distinta manera. El HP elimina frecuencias 'bajas' (tendencia de largo plazo). El BP es más flexible: podés elegir qué rango de frecuencias conservar, lo que te permite aislar ciclos de cualquier duración.",
    formula: null,
    opts: [
      "El BP se aplica a series con tendencia lineal y el HP a series con tendencia exponencial",
      "El HP solo se usa con series estacionarias y el BP con series no estacionarias",
      "El HP se usa con series no estacionarias y el BP solo con series estacionarias",
      "El BP aísla cualquier rango de frecuencias; el HP solo aísla frecuencias bajas de las altas"
    ],
    ans: 3,
    exp: "La diferencia clave es de <strong>flexibilidad en el dominio de frecuencias</strong>. El <strong>HP Filter</strong> separa componentes de baja frecuencia (tendencia) de los de alta frecuencia (ciclo), con un único parámetro λ que controla la suavidad. El <strong>Band-Pass Filter</strong> es más general: permite aislar <strong>cualquier rango de frecuencias</strong>, por ejemplo solo los ciclos entre 6 y 32 trimestres (ciclo de negocios clásico de Baxter-King)."
  },
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "En el flujo de trabajo QPM, ¿cuál es el propósito del script a02_makedata.m?",
    hint: "En la estructura estándar del QPM del FMI, los scripts tienen roles específicos: a01 lee el modelo, a02 prepara los datos, a03 filtra, a04 proyecta. El nombre 'makedata' es literal: hace los datos en el formato que IRIS necesita, mapeando las variables observadas a las variables del modelo.",
    formula: null,
    opts: [
      "Resolver el modelo y generar la solución de expectativas racionales",
      "Importar datos históricos, transformarlos y construir la base de datos de observaciones para el filtro de Kalman",
      "Ejecutar el filtro de Kalman y extraer las variables no observables",
      "Generar los gráficos y tablas del reporte de proyección"
    ],
    ans: 1,
    exp: "El script <strong>a02_makedata.m</strong> es el puente entre los datos brutos y el modelo. Sus tareas: importar datos históricos (<code>dbload</code>), aplicar transformaciones (logaritmos, anualizaciones, empalmes), y construir el objeto <code>dd</code> con las <strong>variables OBS_</strong> que el filtro de Kalman va a usar para comparar el modelo con la realidad. Sin datos bien preparados, el filtro produce resultados sin sentido."
  },
  {
    section: "m4", sectionLabel: "Módulo 4 · Gestión de Datos en MATLAB/IRIS",
    q: "¿Cuál es el propósito de las 'measurement equations' en el código IRIS del QPM?",
    hint: "El modelo tiene variables teóricas (L_GDP, L_CPI) y variables observadas (OBS_L_GDP, OBS_L_CPI). Las measurement equations son el puente. El filtro de Kalman necesita saber cómo se relacionan las variables del modelo con los datos que realmente podés observar y medir.",
    formula: "OBS_L_GDP = L_GDP;\nOBS_L_CPI = L_CPI;\nOBS_RS = RS;",
    opts: [
      "Definir las ecuaciones de comportamiento de los agentes económicos en el modelo estructural",
      "Vincular las variables del modelo teórico con las variables observables en los datos reales",
      "Establecer las restricciones de largo plazo que garantizan la consistencia del estado estacionario",
      "Calcular las brechas (gaps) como diferencia entre niveles observados y tendencias"

let answered = 0;
let correctCount = 0;
let correctM4 = 0, correctM5 = 0, correctM6 = 0;
let lastDetails = [];
let total = questions.length;
let currentFilter = 'all';

function build(filter) {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  let lastSection = '';

  questions.forEach((q, i) => {
    if (filter !== 'all' && q.section !== filter) return;

    if (q.sectionLabel !== lastSection) {
      const sh = document.createElement('div');
      sh.className = 'section-header';
      sh.textContent = q.sectionLabel;
      container.appendChild(sh);
      lastSection = q.sectionLabel;
    }

    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q${i}`;

    const num = String(i + 1).padStart(2, '0');
    const formulaHtml = q.formula
      ? `<div class="q-formula">${q.formula}</div>` : '';

    const optsHtml = q.opts.map((o, j) => `
      <button class="opt" onclick="answer(${i},${j})" id="opt${i}_${j}">
        <span class="opt-key">${String.fromCharCode(65+j)}</span>
        <span>${o}</span>
      </button>
    `).join('');

    block.innerHTML = `
      <div class="q-header">
        <span class="q-num">${num}</span>
        <span class="q-text">${q.q}</span>
      </div>
      ${formulaHtml}
      <div class="hint-box">${q.hint}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="fb${i}">${q.exp}</div>
    `;
    container.appendChild(block);
  });
}

function answer(qi, oi) {
  const q = questions[qi];
  const block = document.getElementById(`q${qi}`);
  const fb = document.getElementById(`fb${qi}`);

  if (!block || block.dataset.answered) return;
  block.dataset.answered = '1';

  q.opts.forEach((_, j) => {
    const btn = document.getElementById(`opt${qi}_${j}`);
    if (!btn) return;
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('reveal');
  });

  const chosen = document.getElementById(`opt${qi}_${oi}`);
  if (oi === q.ans) {
    chosen.classList.add('correct');
    block.classList.add('answered-correct');
    correctCount++;
    if (q.section === 'm4') correctM4++;
    else if (q.section === 'm5') correctM5++;
    else correctM6++;
  } else {
    chosen.classList.add('wrong');
    block.classList.add('answered-wrong');
  }
  lastDetails.push({ qIndex: qi, chosen: oi, isCorrect: oi === q.ans });

  fb.classList.add('show');
  answered++;
  updateProgress();

  if (answered === total) setTimeout(showScore, 700);
}

function updateProgress() {
  const pct = Math.round(answered / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${total} respondidas`;
  document.getElementById('progressPct').textContent = pct + '%';
}

function showScore() {
  const panel = document.getElementById('scorePanel');
  document.getElementById('scoreNum').textContent = `${correctCount}/${total}`;

  if (currentFilter === 'all') {
    document.getElementById('scoreBreak').innerHTML =
      `Módulo 4 (Datos): ${correctM4}/10 &nbsp;·&nbsp; Módulo 5 (Kalman): ${correctM5}/9 &nbsp;·&nbsp; Módulo 6 (Calibración): ${correctM6}/9`;
  } else {
    const labels = { m4: 'Módulo 4 (Datos)', m5: 'Módulo 5 (Kalman)', m6: 'Módulo 6 (Calibración)' };
    document.getElementById('scoreBreak').innerHTML =
      `Resultado parcial — sección: <strong>${labels[currentFilter]}</strong> (${total} preguntas)`;
  }
  panel.classList.add('show');
  panel.scrollIntoView?.({ behavior: 'smooth' });

  AcertiLab.saveModuleResult('C', {
    correct: correctCount,
    total: total,
    details: lastDetails,
    breakdown: { m4: correctM4, m5: correctM5, m6: correctM6 },
    partial: currentFilter !== 'all',
    section: currentFilter
  });
  AcertiLabUI.renderBanner({
    moduleId: 'C',
    bannerEl: document.getElementById('alBanner'),
    reviewEl: document.getElementById('alReview'),
    getQuestion: (i) => questions[i]
  });
}

function filterSection(section, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  build(section);
  currentFilter = section;
  total = section === 'all' ? questions.length : questions.filter(q => q.section === section).length;
  answered = 0; correctCount = 0; correctM4 = 0; correctM5 = 0; correctM6 = 0; lastDetails = [];
  updateProgress();
}

build('all');
AcertiLabUI.renderBanner({
  moduleId: 'C',
  bannerEl: document.getElementById('alBanner'),
  reviewEl: document.getElementById('alReview'),
  getQuestion: (i) => questions[i]
});
</script>
