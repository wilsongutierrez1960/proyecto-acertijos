<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcertiLab · Módulo A — Matemática & Lógica</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #21262d;
      --accent:   #f78166;
      --accent2:  #3fb950;
      --muted:    #8b949e;
      --text:     #e6edf3;
      --correct:  #1a4a2e;
      --wrong:    #4a1a1a;
      --correct-border: #3fb950;
      --wrong-border:   #f78166;
      --font-display: 'Georgia', serif;
      --font-body:    'Segoe UI', Arial, sans-serif;
      --font-mono:    'Consolas', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }

    /* HEADER */
    .top-nav {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .back-link {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
    }
    .back-link:hover { color: var(--accent); }

    .module-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
    }

    .module-links {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .module-links a {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.2rem 0.55rem;
      border-radius: 2px;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .module-links a:hover { border-color: var(--accent); color: var(--accent); }
    .module-links a.current { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 560px) {
      .module-links a:not(.current) { display: none; }
      .top-nav { flex-wrap: wrap; }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: normal;
      margin-bottom: 0.5rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2.5rem; }

    /* PROGRESO */
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* PREGUNTAS */
    .question-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.3s;
    }
    .question-block.answered-correct { border-color: var(--correct-border); background: var(--correct); }
    .question-block.answered-wrong   { border-color: var(--wrong-border);   background: var(--wrong); }

    .q-header {
      display: flex; align-items: baseline; gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .q-num {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }
    .q-text { font-size: 1rem; line-height: 1.6; }

    /* OPCIONES */
    .options { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.1rem; }

    .opt {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
      color: var(--text);
      width: 100%;
    }
    .opt:hover:not(:disabled) { border-color: var(--accent); }
    .opt:disabled { cursor: default; }
    .opt.correct  { border-color: var(--correct-border); background: #1a3a22; color: #7ee89a; }
    .opt.wrong    { border-color: var(--wrong-border);   background: #3a1a1a; color: #f78166; }
    .opt.reveal   { border-color: var(--correct-border); background: #1a3a22; color: #7ee89a; }

    .opt-key {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      width: 1.2rem;
      flex-shrink: 0;
    }

    /* FEEDBACK */
    .feedback {
      margin-top: 0.9rem;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback strong { color: var(--text); }

    /* SCORE FINAL */
    .score-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--accent2);
      border-radius: 6px;
      padding: 2rem;
      text-align: center;
      margin-top: 2rem;
    }
    .score-panel.show { display: block; }
    .score-num {
      font-family: var(--font-display);
      font-size: 3.5rem;
      color: var(--accent2);
      line-height: 1;
    }
    .score-label { color: var(--muted); margin-top: 0.5rem; font-size: 0.9rem; }
    .btn-retry {
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      cursor: pointer;
    }
    .btn-retry:hover { background: var(--accent); color: var(--bg); }

    /* ── AcertiLab: banner de progreso + revisión ─────────── */
    .al-banner {
      display: none;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--text);
    }
    .al-banner .al-badge { font-weight: 700; color: var(--accent); }
    .al-banner .al-muted { color: var(--muted); }
    .al-banner .al-link-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .al-banner .al-link-btn:hover { border-color: var(--accent); color: var(--accent); }
    .al-review-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    .al-review-panel.show { display: block; }
    .al-review-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
    .al-review-item:last-child { border-bottom: none; }
    .al-review-item.wrong { color: #f78166; }
    .al-review-item.correct { color: #7ee89a; }
  </style>
</head>
<body>
<div class="wrap">

  <nav class="top-nav">
    <a class="back-link" href="index.html">← inicio</a>
    <span class="module-badge">Módulo A</span>
    <div class="module-links">
      <a href="acertilab-fun.html" class="current">A · Lógica</a>
      <a href="acertilab-qpm.html">B · QPM</a>
      <a href="acertilab-qpm-c.html">C · Aplicado</a>
      <a href="acertilab-qpm-d.html">D · Examen</a>
    </div>
  </nav>

  <h1>Matemática &amp; Lógica</h1>
  <p class="subtitle">10 acertijos · Seleccioná la opción correcta en cada pregunta</p>

  <div class="al-banner" id="alBanner"></div>
  <div class="al-review-panel" id="alReview"></div>
  <div style="text-align:right;margin-bottom:1rem;">
    <button class="al-link-btn" style="margin-left:0;" onclick="AcertiLabExport.exportModule('A')">📄 Exportar resultado (PDF)</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div id="quiz"></div>

  <div class="score-panel" id="scorePanel">
    <div class="score-num" id="scoreNum"></div>
    <div class="score-label">respuestas correctas de 10</div>
    <button class="btn-retry" onclick="location.reload()">Reintentar</button>
  </div>

</div>

<script src="acertilab-storage.js"></script>
<script src="acertilab-export.js"></script>
<script src="acertilab-ui.js"></script>
<script>
const questions = [
  {
    q: "Una secuencia sigue la regla: cada término es la suma de los dos anteriores. Si los primeros dos términos son 2 y 3, ¿cuál es el quinto término?",
    opts: ["10", "13", "18", "21"],
    ans: 1,
    exp: "La secuencia es 2, 3, 5, 8, <strong>13</strong>. Cada término = suma de los dos anteriores (tipo Fibonacci)."
  },
  {
    q: "Si el 30 % de un número es 72, ¿cuál es el 50 % de ese mismo número?",
    opts: ["108", "120", "144", "96"],
    ans: 1,
    exp: "El número es 72 / 0.3 = 240. El 50 % de 240 = <strong>120</strong>."
  },
  {
    q: "Un tren parte a las 14:45 y llega a destino 3 h 50 min después. ¿A qué hora llega?",
    opts: ["18:25", "18:35", "18:15", "18:45"],
    ans: 1,
    exp: "14:45 + 3:50 = 17:95 → 18:<strong>35</strong>. (95 min = 1 h 35 min)"
  },
  {
    q: "¿Cuántos cuadrados hay en total en una cuadrícula de 3 × 3?",
    opts: ["9", "12", "14", "16"],
    ans: 2,
    exp: "Cuadrados 1×1: 9 · Cuadrados 2×2: 4 · Cuadrado 3×3: 1 → Total = <strong>14</strong>."
  },
  {
    q: "Pedro tiene el doble de edad que Ana. Dentro de 10 años, Pedro tendrá 1.5 veces la edad de Ana. ¿Cuántos años tiene Ana ahora?",
    opts: ["10", "15", "20", "25"],
    ans: 0,
    exp: "P = 2A. En 10 años: (2A+10) = 1.5(A+10) → 2A+10 = 1.5A+15 → 0.5A = 5 → A = <strong>10</strong>."
  },
  {
    q: "Si LUNA = 4 y SOL = 3, ¿cuánto vale ECLIPSE?",
    opts: ["5", "6", "7", "8"],
    ans: 2,
    exp: "El valor es el número de <strong>letras vocales</strong>: LUNA (U,A)=2… no, es número de letras: LUNA=4, SOL=3, ECLIPSE=<strong>7</strong>."
  },
  {
    q: "Una canilla llena un tanque en 6 horas. Otra lo vacía en 9 horas. Si ambas operan juntas con el tanque lleno, ¿en cuántas horas se vacía?",
    opts: ["12", "15", "18", "20"],
    ans: 2,
    exp: "Tasa neta = 1/9 − 1/6 = −1/18 (se vacía). Tiempo = <strong>18</strong> horas."
  },
  {
    q: "En una sala hay 100 personas. El 99 % son adultos. ¿Cuántos adultos deben salir para que los adultos sean el 98 % del total?",
    opts: ["1", "50", "49", "51"],
    ans: 1,
    exp: "Hay 99 adultos y 1 menor. Para que 1 sea el 2%: total = 50. Deben salir 99 − 49 = <strong>50</strong> adultos."
  },
  {
    q: "¿Cuál es el siguiente número en la serie: 1, 4, 9, 16, 25, ___?",
    opts: ["30", "36", "34", "32"],
    ans: 1,
    exp: "Son cuadrados perfectos: 1², 2², 3², 4², 5², <strong>6² = 36</strong>."
  },
  {
    q: "Un reloj marca las 3:00. ¿Cuántos grados forma el ángulo entre el minutero y el horario?",
    opts: ["60°", "75°", "90°", "120°"],
    ans: 2,
    exp: "A las 3:00 el horario apunta al 3 (90°) y el minutero al 12 (0°). Ángulo = <strong>90°</strong>."
  }
];

let answered = 0;
let correct = 0;
let lastDetails = [];

function build() {
  const container = document.getElementById('quiz');
  questions.forEach((q, i) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q${i}`;

    const optsHtml = q.opts.map((o, j) => `
      <button class="opt" onclick="answer(${i},${j})" id="opt${i}_${j}">
        <span class="opt-key">${String.fromCharCode(65+j)}</span>
        ${o}
      </button>
    `).join('');

    block.innerHTML = `
      <div class="q-header">
        <span class="q-num">0${i+1}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="fb${i}">${q.exp}</div>
    `;
    container.appendChild(block);
  });
}

function answer(qi, oi) {
  const q = questions[qi];
  const block = document.getElementById(`q${qi}`);
  const fb = document.getElementById(`fb${qi}`);

  // deshabilitar todos los botones de esta pregunta
  q.opts.forEach((_, j) => {
    const btn = document.getElementById(`opt${qi}_${j}`);
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('reveal');
  });

  const chosen = document.getElementById(`opt${qi}_${oi}`);
  if (oi === q.ans) {
    chosen.classList.add('correct');
    block.classList.add('answered-correct');
    correct++;
  } else {
    chosen.classList.add('wrong');
    block.classList.add('answered-wrong');
  }
  lastDetails.push({ qIndex: qi, chosen: oi, isCorrect: oi === q.ans });

  fb.classList.add('show');
  answered++;
  updateProgress();

  if (answered === questions.length) {
    setTimeout(showScore, 600);
  }
}

function updateProgress() {
  document.getElementById('progressFill').style.width = (answered / questions.length * 100) + '%';
}

function showScore() {
  const panel = document.getElementById('scorePanel');
  document.getElementById('scoreNum').textContent = `${correct}/10`;
  panel.classList.add('show');

  AcertiLab.saveModuleResult('A', { correct: correct, total: questions.length, details: lastDetails });
  AcertiLabUI.renderBanner({
    moduleId: 'A',
    bannerEl: document.getElementById('alBanner'),
    reviewEl: document.getElementById('alReview'),
    getQuestion: (i) => questions[i]
  });

  panel.scrollIntoView?.({ behavior: 'smooth' });
}

build();
AcertiLabUI.renderBanner({
  moduleId: 'A',
  bannerEl: document.getElementById('alBanner'),
  reviewEl: document.getElementById('alReview'),
  getQuestion: (i) => questions[i]
});
</script>
<script src="acertilab-tutor.js"></script>
<script>AcertiLabTutor.init({});</script>
</body>
</html>
